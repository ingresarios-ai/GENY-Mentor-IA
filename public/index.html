<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geny tu Mentor IA — INGRESARIOS</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  
  <div id="auth-screen" class="auth-container">
    <div class="auth-box">
      <div class="logo" style="justify-content: center; margin-bottom: 24px;">
        <div class="logo-badge">G</div>
        <div>
          <div class="logo-title">GENY</div>
          <div class="logo-sub">TU MENTOR IA</div>
        </div>
      </div>
      <h2 id="auth-title">Iniciar Sesión</h2>
      <form id="auth-form">
        <div class="input-group" id="name-group" style="display: none;">
          <label>Nombre completo</label>
          <input type="text" id="auth-name" placeholder="Tu nombre">
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="auth-email" required placeholder="tu@email.com">
        </div>
        <div class="input-group">
          <label>Contraseña</label>
          <div class="password-wrap">
            <input type="password" id="auth-password" required placeholder="••••••••">
            <button type="button" class="eye-toggle" id="eye-toggle-1" aria-label="Mostrar contraseña">
              <svg id="eye-icon-1" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-off-icon-1" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div class="input-group" id="confirm-group" style="display: none;">
          <label>Confirmar Contraseña</label>
          <div class="password-wrap">
            <input type="password" id="auth-password-confirm" placeholder="••••••••">
            <button type="button" class="eye-toggle" id="eye-toggle-2" aria-label="Mostrar contraseña">
              <svg id="eye-icon-2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-off-icon-2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div class="input-group" id="phone-group" style="display: none;">
          <label>Teléfono</label>
          <div class="phone-row">
            <select id="auth-country-code">
              <option value="+52">🇲🇽 +52</option>
              <option value="+57">🇨🇴 +57</option>
              <option value="+1">🇺🇸 +1</option>
              <option value="+34">🇪🇸 +34</option>
              <option value="+54">🇦🇷 +54</option>
              <option value="+51">🇵🇪 +51</option>
              <option value="+56">🇨🇱 +56</option>
              <option value="+593">🇪🇨 +593</option>
              <option value="+58">🇻🇪 +58</option>
              <option value="+502">🇬🇹 +502</option>
              <option value="+506">🇨🇷 +506</option>
              <option value="+507">🇵🇦 +507</option>
              <option value="+591">🇧🇴 +591</option>
              <option value="+595">🇵🇾 +595</option>
              <option value="+598">🇺🇾 +598</option>
              <option value="+503">🇸🇻 +503</option>
              <option value="+504">🇭🇳 +504</option>
              <option value="+505">🇳🇮 +505</option>
            </select>
            <input type="tel" id="auth-phone" placeholder="10 dígitos">
          </div>
        </div>
        <button type="submit" class="btn btn-green" style="width: 100%; margin-top: 10px;" id="auth-submit">Entrar</button>
      </form>
      <p style="text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-dim);">
        <span id="auth-toggle-text">¿No tienes cuenta?</span> 
        <a href="#" id="auth-toggle-btn" style="color: var(--green); text-decoration: none;">Regístrate</a>
      </p>
    </div>
  </div>

  <div id="app-screen" style="display: none; height: 100%; width: 100%;">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-badge">G</div>
        <div>
          <div class="logo-title">GENY</div>
          <div class="logo-sub">TU MENTOR IA</div>
        </div>
      </div>
      <nav>
        <button class="nav-btn active" data-view="dashboard">⚡ Dashboard</button>
        <button class="nav-btn" data-view="nuevo">🎯 Nuevo Trade</button>
        <button class="nav-btn" data-view="bitacora">📓 Bitácora</button>
        <button class="nav-btn" data-view="chat">🤖 Geny</button>
        <button class="nav-btn" data-view="liga">🏆 Liga</button>
        <button class="nav-btn" data-view="academia">🎓 Academia</button>
        <button class="nav-btn" data-view="ajustes">⚙️ Ajustes</button>
        <button class="nav-btn" id="btn-logout" style="margin-top: auto; color: #ff5252;">🚪 Salir</button>
      </nav>
      <div class="sidebar-footer">
        <div class="quote">"Eso separa al que sueña<br>del que vive de esto."</div>
      </div>
    </aside>

    <main id="main">
      <!-- Las vistas se renderizan aquí con app.js -->
    </main>
  </div>

  <script src="knowledge.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
